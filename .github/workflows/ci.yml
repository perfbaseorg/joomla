name: PHP CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  php-tests:
    name: PHPStan and PHPUnit on PHP ${{ matrix.php-versions }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.1']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Validate package metadata
        run: composer validate --no-check-publish

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=2G --no-progress src

      - name: Run PHPUnit
        run: composer run test

  joomla-framework-smoke:
    name: Joomla framework-package smoke on PHP ${{ matrix.php-versions }} and Joomla ${{ matrix.joomla-versions }}
    runs-on: ubuntu-latest
    needs: php-tests

    strategy:
      fail-fast: false
      matrix:
        include:
          - php-versions: '8.1'
            joomla-versions: '^4.4'
          - php-versions: '8.1'
            joomla-versions: '^5.0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          coverage: none
          tools: composer:v2

      - name: Install plugin dev dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Joomla framework packages and local CMS stubs
        run: |
          mkdir -p /tmp/joomla-host
          composer init --working-dir=/tmp/joomla-host --name=perfbase/joomla-host --no-interaction
          composer require --working-dir=/tmp/joomla-host --no-interaction --prefer-dist \
            joomla/di:"${{ matrix.joomla-versions == '^4.4' && '^2.0' || '^3.0' }}" \
            joomla/event:"${{ matrix.joomla-versions == '^4.4' && '^2.0' || '^3.0' }}"
          cp stubs/joomla-cms.stub.php /tmp/joomla-host/joomla-cms-stubs.php
          cd /tmp/joomla-host && php -r '
            $json = json_decode(file_get_contents("composer.json"), true);
            $json["autoload"]["files"] = ["joomla-cms-stubs.php"];
            file_put_contents("composer.json", json_encode($json, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES));
          ' && composer dump-autoload

      - name: Run Joomla HTTP framework-package smoke test
        run: php tests/Host/joomla-smoke.php /tmp/joomla-host/vendor/autoload.php vendor/autoload.php http

      - name: Run Joomla CLI framework-package smoke test
        run: php tests/Host/joomla-smoke.php /tmp/joomla-host/vendor/autoload.php vendor/autoload.php cli
